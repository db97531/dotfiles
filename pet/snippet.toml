[[snippets]]
  description = "yt-dlp mp3で保存(Dドライブ)"
  command = "yt-dlp -o \"/mnt/d/_mydata/_yt-dlp/%(title)s.%(ext)s\" -x --audio-format mp3"
  output = ""

[[snippets]]
  description = "yt-dlp mp4で保存(Dドライブ)"
  #command = "yt-dlp -o \"/mnt/d/_mydata/_yt-dlp/%(title)s.%(ext)s\" -f mp4/bestvideo+m4a/bestaudio --merge-output-format mp4"
  command = "yt-dlp -o \"/mnt/d/_mydata/_yt-dlp/%(title)s.%(ext)s\""
  output = ""

[[snippets]]
  description = "yt-dlp mp4で低画質保存(Dドライブ)"
  #command = "yt-dlp -o \"/mnt/d/_mydata/_yt-dlp/%(title)s.%(ext)s\" -f mp4/bestvideo+m4a/bestaudio --merge-output-format mp4"
  command = "yt-dlp -o \"/mnt/d/_mydata/_yt-dlp/%(title)s[%(id)s].%(ext)s\" -f 'bestvideo[ext=mp4][height<=480]+bestaudio[ext=m4a]/best[ext=mp4][height<=480]'"
  output = ""

[[snippets]]
  description = "yt-dlp mp4で中画質保存(Dドライブ)"
  #command = "yt-dlp -o \"/mnt/d/_mydata/_yt-dlp/%(title)s.%(ext)s\" -f mp4/bestvideo+m4a/bestaudio --merge-output-format mp4"
  command = "yt-dlp -o \"/mnt/d/_mydata/_yt-dlp/%(title)s[%(id)s].%(ext)s\" -f 'bestvideo[ext=mp4][height<=720]+bestaudio[ext=m4a]/best[ext=mp4][height<=720]'"
  output = ""

[[snippets]]
  description = "yt-dlp mp4で最高画質保存(Dドライブ)"
  #command = "yt-dlp -o \"/mnt/d/_mydata/_yt-dlp/%(title)s.%(ext)s\" -f mp4/bestvideo+m4a/bestaudio --merge-output-format mp4"
  command = "yt-dlp -o \"/mnt/d/_mydata/_yt-dlp/%(title)s[%(id)s].%(ext)s\" -f 'bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]'"
  output = ""

[[snippets]]
  description = "youtube-dl チャプターごとに分割してmp3で保存"
  command = "yt-dlp -x --audio-format mp3 --split-chapters"
  output = ""

[[snippets]]
  description = "youtube-dl チャプターごとに分割してmp3で保存(template)"
  command = "yt-dlp -x --audio-format mp3 --split-chapters -o \"chapter:%(section_number)02d %(section_title).100s.%(ext)s\""
  output = ""

